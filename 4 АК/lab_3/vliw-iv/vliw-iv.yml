  name: sdbm_hash
  limit: 2000
  memory_size: 0x1000
  memory_mapped_io:
    0x80: ["abc\0"]
    0x84: []
  reports:
    - name: step-by-step
      slice: all
      view: |
        {pc}:	{instruction}	{pc:label}
    - name: Result
      slice: last
      view: |
        numio[0x80]: {io:0x80:dec}
        numio[0x84]: {io:0x84:dec}
      assert: |
        numio[0x80]: [] >>> []
        numio[0x84]: [] >>> [807794786]
    - name: vliw-stats
      slice: last
      view: |
        vliw:load-percent:    {vliw:load-percent}
        vliw:avg-load:        {vliw:avg-load}
        vliw:bundles-by-load: {vliw:bundles-by-load}